<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تمرین طراحی سیستم اعلان</title>
    <style>
        body {
            background-color: #2c2c2c; /* زمینه تیره مثل عکس‌هایت */
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* استایل پنجره وسط صفحه (مطابق عکس سوم) */
        .modal {
            background: white;
            width: 85%;
            max-width: 350px;
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
        }

        h2 { font-size: 24px; margin: 10px 0; color: #000; }
        
        .amount {
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
            color: #222;
        }

        .timer {
            color: #ff0000;
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-info {
            flex: 1;
            padding: 12px;
            border: 1px solid #007bff;
            border-radius: 10px;
            color: #007bff;
            background: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-main {
            flex: 1;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="modal">
        <div class="close-btn">×</div>
        <h2>تبریک!</h2>
        <p>شما یک پیام آموزشی جدید دارید</p>
        <div class="amount">کد یادگیری: #108375</div>
        <div class="timer" id="timer">01:00</div>

        <div class="btn-container">
            <button class="btn-info">جزئیات</button>
            <button class="btn-main" onclick="sendNotification()">ارسال اعلان به گوشی</button>
        </div>
    </div>

    <script>
        // ۱. عملکرد تایمر
        let time = 60;
        setInterval(() => {
            if (time > 0) {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('timer').innerText = `0${m}:${s < 10 ? '0' + s : s}`;
            }
        }, 1000);

        // ۲. عملکرد ارسال پیام به بالای گوشی (مثل عکس ۱ و ۲)
        function sendNotification() {
            // درخواست اجازه از کاربر
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    // ایجاد پیام در نوار وضعیت گوشی
                    new Notification("Onaylandı (تایید شد)", {
                        body: "آموزش با موفقیت فعال شد. برای مشاهده کلیک کنید.",
                        icon: "https://cdn-icons-png.flaticon.com/512/190/190411.png" // آیکون تیک سبز
                    });
                } else {
                    alert("لطفاً اجازه ارسال اعلان (Notification) را در مرورگر بدهید.");
                }
            });
        }
    </script>
</body>
</html>
